name: release

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  TAG: ${{ github.event.release.tag_name }}

jobs:
  container-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read Go version
        id: go
        run: echo "version=$(cat .go-version)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=raw,value=${{ env.TAG }}
            type=raw,value=latest,enable=${{ !github.event.release.prerelease }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            BASE_IMAGE=public.ecr.aws/eks-distro-build-tooling/eks-distro-minimal-base-nonroot:2025-12-09-1765306943.2023
            BUILD_IMAGE=public.ecr.aws/docker/library/golang:${{ steps.go.outputs.version }}

  helm-chart:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login "${{ env.REGISTRY }}" \
            -u "${{ github.actor }}" \
            --password-stdin

      - name: Package Helm chart
        run: |
          VERSION="${{ env.TAG }}"
          helm package helm/aws-load-balancer-controller \
            --version "${VERSION#v}" \
            --app-version "${{ env.TAG }}"

      - name: Push Helm chart
        run: |
          VERSION="${{ env.TAG }}"
          REPO_OWNER="${{ github.repository_owner }}"
          helm push \
            "aws-load-balancer-controller-${VERSION#v}.tgz" \
            "oci://${{ env.REGISTRY }}/${REPO_OWNER,,}/charts"
